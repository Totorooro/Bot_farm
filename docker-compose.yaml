version: '3.8' 

services:
  db:
    image: postgres:15
    container_name: bot_db
    env_file:
      - .env-non-dev
    ports:
      - "5432:5432"
    healthcheck:                  
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]    

  bot_f:
    build:
      context: .
    env_file:
      - .env-non-dev
    depends_on:
      db:
        condition: service_healthy   
    command: ["/bot_f/docker/app.sh"]
    ports:
      - "8081:8000"

volumes:
  postgresdata: